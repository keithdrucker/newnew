          name: ownerId
          required: false
          schema: { type: integer }
        - in: query
          name: frequency
          required: false
          schema: { $ref: "#/components/schemas/OperationalTaskFrequency" }
        - in: query
          name: type
          required: false
          schema: { $ref: "#/components/schemas/OperationalTaskType" }
        - in: query
          name: dueWindow
          required: false
          schema:
            type: string
            enum: [today, week, overdue]
        - in: query
          name: search
          required: false
          schema: { type: string }
        - in: query
          name: includeClosed
          required: false
          description: >
            When true, include rows whose status is `closed`. Default
            is false: closed tasks are hidden so the working list
            stays focused on active work. (`completed` rows are always
            returned and can be filtered out via the `status` param.)
          schema: { type: boolean }
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/OperationalTask" }
    post:
      operationId: createOperationalTask
      tags: [operationalTasks]
      summary: Create an operational task
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateOperationalTaskInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OperationalTask" }

  /operational-tasks/{id}:
    get:
      operationId: getOperationalTask
      tags: [operationalTasks]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OperationalTask" }
    patch:
      operationId: updateOperationalTask
      tags: [operationalTasks]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateOperationalTaskInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OperationalTask" }
    delete:
      operationId: deleteOperationalTask
      tags: [operationalTasks]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /operational-tasks/{id}/complete:
    post:
      operationId: completeOperationalTask
      tags: [operationalTasks]
      summary: >
        Mark a task complete. For recurring tasks, atomically creates the
        next instance with `nextDueDate` advanced by the frequency interval
        and the same checklist (with `done` flags reset).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Result of completion
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompleteOperationalTaskResult" }

  /operational-tasks/{id}/activity:
    get:
      operationId: listOperationalTaskActivity
      tags: [operationalTasks]
      summary: Activity / audit log for a task
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Activity entries, newest first.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/OperationalTaskActivity" }

  /operational-tasks/{id}/time-entries:
    get:
      operationId: listOperationalTaskTimeEntries
      tags: [operationalTasks]
      summary: Time entries logged against a task
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Time entries, newest first.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/OperationalTaskTimeEntry" }
    post:
      operationId: createOperationalTaskTimeEntry
      tags: [operationalTasks]
      summary: Log time against a task
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: "#/components/schemas/CreateOperationalTaskTimeEntryInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OperationalTaskTimeEntry" }

  /operational-tasks/{id}/time-entries/{entryId}:
    patch:
      operationId: updateOperationalTaskTimeEntry
      tags: [operationalTasks]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: entryId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: "#/components/schemas/UpdateOperationalTaskTimeEntryInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OperationalTaskTimeEntry" }
    delete:
      operationId: deleteOperationalTaskTimeEntry
      tags: [operationalTasks]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: entryId
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    Role:
      type: string
      enum: [admin, agent, end_user]

    Session:
      type: object
      properties:
        userId: { type: integer }
        name: { type: string }
        email: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        departmentId:
          type: ["integer", "null"]
        departmentName:
          type: ["string", "null"]
        defaultTicketBoard:
          type: ["string", "null"]
          description: >
            Slug of the user's preferred default ticket board. `null` means
            All Tickets. When the user opens `/tickets`, the UI auto-loads
            this board.
        defaultInitiativeBoard:
          type: ["string", "null"]
          description: >
            Slug of the user's preferred default team for the Initiatives
            section. `null` means All Initiatives.
        defaultProjectBoard:
          type: ["string", "null"]
          description: >
            Slug of the user's preferred default team for the Projects
            section. `null` means All Projects.
        defaultOperationalTaskBoard:
          type: ["string", "null"]
          description: >
            Slug of the user's preferred default team for the Operational
            Tasks section. `null` means All Operational Tasks.
      required: [userId, name, email, role]

    UpdateMePreferencesInput:
      type: object
      properties:
        defaultTicketBoard:
          type: ["string", "null"]
          description: >
            Slug of the department to use as the user's default ticket
            board. Pass `null` to reset to All Tickets.
        defaultInitiativeBoard:
          type: ["string", "null"]
        defaultProjectBoard:
          type: ["string", "null"]
        defaultOperationalTaskBoard:
          type: ["string", "null"]

    SwitchSessionInput:
      type: object
      properties:
        userId: { type: integer }
      required: [userId]

    Department:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        color: { type: string }
        icon: { type: string }
        description:
          type: ["string", "null"]
        ticketCount: { type: integer }
      required: [id, name, slug, color, icon, ticketCount]

    CreateDepartmentInput:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        color: { type: string }
        icon: { type: string }
        description:
          type: ["string", "null"]
      required: [name, slug, color, icon]

    UpdateDepartmentInput:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        color: { type: string }
        icon: { type: string }
        description:
          type: ["string", "null"]

    DepartmentSettings:
      type: object
      properties:
        departmentId: { type: integer }
        portalEnabled: { type: boolean }
        portalTitle: { type: string }
        portalWelcome: { type: string }
        defaultPriority:
          type: string
          enum: [low, medium, high, urgent]
        slaResponseMinutes: { type: integer }
        slaResolutionMinutes: { type: integer }
        autoAssign: { type: boolean }
        notifyOnNewTicket: { type: boolean }
        notifyOnSlaBreach: { type: boolean }
        allowEndUserAttachments: { type: boolean }
        requireCategory: { type: boolean }
        businessHoursStart: { type: string }
        businessHoursEnd: { type: string }
        ticketCategories:
          type: array
          items: { type: string }
      required:
        - departmentId
        - portalEnabled
        - portalTitle
        - portalWelcome
        - defaultPriority
        - slaResponseMinutes
        - slaResolutionMinutes
        - autoAssign
        - notifyOnNewTicket
        - notifyOnSlaBreach
        - allowEndUserAttachments
        - requireCategory
        - businessHoursStart
        - businessHoursEnd
        - ticketCategories

    BoardRole:
      type: string
      # `manager` sits between `modify` and `owner`: same write powers
      # as modify, plus the ability to view teammates' timesheets on
      # this board. `owner` inherits manager-level visibility.
      enum: [owner, manager, modify, read_only]

    # The four Workspace areas RBAC can be configured per-team-member for.
    # Each `BoardMember` may carry overrides per area; missing areas fall
    # back to the team-default `role` column. The special value `none`
    # revokes access to that area for that agent on that team.
    BoardSection:
      type: string
      enum: [tickets, operational_tasks, initiatives, projects]

    BoardSectionRole:
      type: string
      enum: [owner, manager, modify, read_only, none]

    BoardSectionRoles:
      type: object
      properties:
        tickets: { $ref: "#/components/schemas/BoardSectionRole" }
        operational_tasks: { $ref: "#/components/schemas/BoardSectionRole" }
        initiatives: { $ref: "#/components/schemas/BoardSectionRole" }
        projects: { $ref: "#/components/schemas/BoardSectionRole" }

    OperationalTaskType:
      type: string
      enum: [recurring, one_time]

    OperationalTaskStatus:
      type: string
      # `overdue` is intentionally NOT in the enum — it's derived at
      # read time from `nextDueDate < today AND status NOT IN
      # ("completed","closed")`.
      # `closed` is system-applied only: a one_time task that has been
      # `completed` for >24h is auto-promoted to `closed` lazily on
      # the next read.
      enum: [scheduled, in_progress, completed, closed]

    OperationalTaskControlCategory:
      type: string
      # ITIL-style tag describing the control area this task supports.
      # Free-form on the wire (callers may send any string the server
      # accepts) but the UI picks from this fixed list.
      enum:
        - security
        - access_management
        - backup_recovery
        - change_management
        - monitoring
        - compliance
        - operations

    OperationalTaskFrequency:
      type: string
      enum:
        - daily
        - weekly
        - bi_weekly
        - monthly
        - quarterly
        - bi_annual
        - annual
        - multi_year

    OperationalTaskChecklistItem:
      type: object
      properties:
        id: { type: string }
        text: { type: string }
        done: { type: boolean }
        assigneeId:
          type: ["integer", "null"]
        assigneeName:
          type: ["string", "null"]
        dueDate:
          type: ["string", "null"]
          description: YYYY-MM-DD
        completedAt:
          type: ["string", "null"]
          description: >
            ISO timestamp captured the moment `done` flipped from
            false to true. Cleared when the item is unchecked.
      required: [id, text, done]

    OperationalTaskActivity:
      type: object
      description: >
        Immutable audit log entry for an Operational Task. Created by
        the server in response to status changes, owner reassignment,
        completion, closure, checklist toggles, and time entry CRUD.
        Read-only — the API offers no PATCH/DELETE.
      properties:
        id: { type: integer }
        taskId: { type: integer }
        userId:
          type: ["integer", "null"]
        userName:
          type: ["string", "null"]
          description: >
            "System" actions (e.g. lazy auto-close after 24h) leave
            `userId` null and the UI renders them with a "System" label.
        action: { type: string }
        details:
          type: object
          additionalProperties: true
          description: Per-action payload. Shape varies by `action`.
        createdAt: { type: string }
      required: [id, taskId, action, createdAt]

    OperationalTaskTimeEntry:
      type: object
      properties:
        id: { type: integer }
        taskId: { type: integer }
        taskName: { type: string }
        departmentId: { type: integer }
        departmentName: { type: string }
        userId: { type: integer }
        userName: { type: string }
        startAt: { type: string }
        endAt: { type: string }
        durationMinutes: { type: integer }
        note: { type: string }
        createdAt: { type: string }
      required:
        - id
        - taskId
        - taskName
        - departmentId
        - departmentName
        - userId
        - userName
        - startAt
        - endAt
        - durationMinutes
        - note
        - createdAt

    CreateOperationalTaskTimeEntryInput:
      type: object
      properties:
        startAt: { type: string }
        endAt: { type: string }
        note: { type: string }
      required: [startAt, endAt, note]

    UpdateOperationalTaskTimeEntryInput:
      type: object
      properties:
        startAt: { type: string }
        endAt: { type: string }
        note: { type: string }

    OperationalTask:
      type: object
      properties:
        id: { type: integer }
        departmentId: { type: integer }
        departmentName: { type: string }
        name: { type: string }
        description: { type: string }
        type: { $ref: "#/components/schemas/OperationalTaskType" }
        frequency:
          oneOf:
            - { $ref: "#/components/schemas/OperationalTaskFrequency" }
            - { type: "null" }
        nextDueDate: { type: string, description: YYYY-MM-DD }
        ownerId:
          type: ["integer", "null"]
        ownerName:
          type: ["string", "null"]
        status: { $ref: "#/components/schemas/OperationalTaskStatus" }
        # Always returned alongside status. UI shows an "Overdue" badge
        # when this is true.
        isOverdue: { type: boolean }
        controlCategory:
          type: ["string", "null"]
          description: >
            Optional ITIL-style tag (e.g. `security`,
            `backup_recovery`). The UI offers a fixed picker but the
            API accepts any string for forward compatibility.
        checklist:
          type: array
          items: { $ref: "#/components/schemas/OperationalTaskChecklistItem" }
        seriesId:
          type: ["integer", "null"]
        completedAt:
          type: ["string", "null"]
        completedById:
          type: ["integer", "null"]
        completedByName:
          type: ["string", "null"]
        createdAt: { type: string }
        updatedAt: { type: string }
      required:
        - id
        - departmentId
        - departmentName
        - name
        - description
        - type
        - nextDueDate
        - status
        - isOverdue
        - checklist
        - createdAt
        - updatedAt

    CreateOperationalTaskInput:
      type: object
      properties:
        departmentId: { type: integer }
        name: { type: string }
        description: { type: string }
        type: { $ref: "#/components/schemas/OperationalTaskType" }
        frequency:
          oneOf:
            - { $ref: "#/components/schemas/OperationalTaskFrequency" }
            - { type: "null" }
        nextDueDate: { type: string, description: YYYY-MM-DD }
        ownerId:
          type: ["integer", "null"]
        controlCategory:
          type: ["string", "null"]
        checklist:
          type: array
          items: { $ref: "#/components/schemas/OperationalTaskChecklistItem" }
      required: [departmentId, name, type, nextDueDate]

    UpdateOperationalTaskInput:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        type: { $ref: "#/components/schemas/OperationalTaskType" }
        frequency:
          oneOf:
            - { $ref: "#/components/schemas/OperationalTaskFrequency" }
            - { type: "null" }
        nextDueDate: { type: string }
        ownerId:
          type: ["integer", "null"]
        controlCategory:
          type: ["string", "null"]
        # `completed` and `closed` are NOT accepted here — completion
        # goes through POST /complete (drives the recurring chain),
        # and `closed` is system-applied only (after 24h on one_time).
        # Allowed values: scheduled | in_progress.
        status:
          type: string
          enum: [scheduled, in_progress]
        checklist:
          type: array
          items: { $ref: "#/components/schemas/OperationalTaskChecklistItem" }

    CompleteOperationalTaskResult:
      type: object
      properties:
        completed: { $ref: "#/components/schemas/OperationalTask" }
        # Present when the completed task was recurring — this is the
        # auto-created next instance with the advanced due date.
        nextInstance:
          oneOf:
            - { $ref: "#/components/schemas/OperationalTask" }
            - { type: "null" }
      required: [completed]

    TimesheetVisibleUser:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        # True for the row that represents the caller — lets the UI
        # default to "My Timesheet" without a follow-up session lookup.
        isSelf: { type: boolean }
      required: [id, name, email, isSelf]

    BoardMember:
      type: object
      properties:
        id: { type: integer }
        departmentId: { type: integer }
        userId: { type: integer }
        role: { $ref: "#/components/schemas/BoardRole" }
        sectionRoles:
          oneOf:
            - { $ref: "#/components/schemas/BoardSectionRoles" }
            - { type: "null" }
        userName: { type: string }
        userEmail: { type: string }
        userTitle:
          type: ["string", "null"]
        userGlobalRole: { $ref: "#/components/schemas/Role" }
        createdAt:
          type: string
          format: date-time
      required: [id, departmentId, userId, role, sectionRoles, userName, userEmail, userTitle, userGlobalRole, createdAt]

    AddBoardMemberInput:
      type: object
      properties:
        userId: { type: integer }
        role: { $ref: "#/components/schemas/BoardRole" }
        sectionRoles:
          oneOf:
            - { $ref: "#/components/schemas/BoardSectionRoles" }
            - { type: "null" }
      required: [userId, role]

    UpdateBoardMemberInput:
      type: object
      properties:
        role: { $ref: "#/components/schemas/BoardRole" }
        sectionRoles:
          oneOf:
            - { $ref: "#/components/schemas/BoardSectionRoles" }
            - { type: "null" }

    UpdateDepartmentSettingsInput:
      type: object
      properties:
        portalEnabled: { type: boolean }
        portalTitle: { type: string }
        portalWelcome: { type: string }
        defaultPriority:
          type: string
          enum: [low, medium, high, urgent]
        slaResponseMinutes: { type: integer }
        slaResolutionMinutes: { type: integer }
        autoAssign: { type: boolean }
        notifyOnNewTicket: { type: boolean }
        notifyOnSlaBreach: { type: boolean }
        allowEndUserAttachments: { type: boolean }
        requireCategory: { type: boolean }
        businessHoursStart: { type: string }
        businessHoursEnd: { type: string }
        ticketCategories:
          type: array
          items: { type: string }

    Ticket:
      type: object
      properties:
        id: { type: integer }
        ticketKey: { type: string }
        title: { type: string }
        description: { type: string }
        type:
          type: string
          enum: [incident, request]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        status:
          type: string
          enum:
            - new
            - in_progress
            - with_user
            - with_vendor
            - on_hold
            - scheduled
            - resolved
            - closed
        source:
          type: string
          enum: [portal, email, phone, chat, walk_in]
        supportLevel:
          type: integer
          enum: [1, 2, 3]
        departmentId: { type: integer }
        departmentName: { type: string }
        reporterId: { type: integer }
        reporterName: { type: string }
        assigneeId:
          type: ["integer", "null"]
        assigneeName:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        team:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        riskLevel:
          type: string
          enum: [low, medium, high, critical]
        rootCause:
          type: ["string", "null"]
        resolution:
          type: ["string", "null"]
        slaBreached: { type: boolean }
        responseSlaBreached: { type: boolean }
        slaStatus:
          type: string
          enum: [on_track, breached, paused]
        slaPhase:
          type: string
          description: |
            Which SLA clock is currently being tracked.
            * `response` — before the first agent response.
            * `resolution` — after the first agent response, while the
              ticket is in an active state.
            * `none` — ticket is resolved/closed; SLA has stopped.
          enum: [response, resolution, none]
        slaPaused:
          type: boolean
          description: |
            True when the resolution SLA is currently paused (status is
            with_user, with_vendor, on_hold, or scheduled).
        slaActiveDueAt:
          type: ["string", "null"]
          format: date-time
          description: |
            Effective deadline of the *currently active* SLA, taking
            accumulated pause time into account. Null when slaPhase is
            `none` or the ticket has no due date.
        responseDueAt:
          type: ["string", "null"]
          format: date-time
        resolutionDueAt:
          type: ["string", "null"]
          format: date-time
        firstResponseAt:
          type: ["string", "null"]
          format: date-time
        resolvedAt:
          type: ["string", "null"]
          format: date-time
        withUserSince:
          type: ["string", "null"]
          format: date-time
        lastUserReplyAt:
          type: ["string", "null"]
          format: date-time
        closureReason:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - ticketKey
        - title
        - description
        - type
        - priority
        - status
        - source
        - departmentId
        - departmentName
        - reporterId
        - reporterName
        - slaBreached
        - responseSlaBreached
        - slaStatus
        - slaPhase
        - slaPaused
        - riskLevel
        - createdAt
        - updatedAt

    TicketComment:
      type: object
      properties:
        id: { type: integer }
        ticketId: { type: integer }
        authorName: { type: string }
        authorRole: { $ref: "#/components/schemas/Role" }
        body: { type: string }
        kind:
          type: string
          enum: [reply, internal_note]
        createdAt:
          type: string
          format: date-time
      required: [id, ticketId, authorName, authorRole, body, kind, createdAt]

    TicketDetail:
      allOf:
        - $ref: "#/components/schemas/Ticket"
        - type: object
          properties:
            comments:
              type: array
              items: { $ref: "#/components/schemas/TicketComment" }
          required: [comments]

    CreateTicketInput:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        type:
          type: string
          enum: [incident, request]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        source:
          type: string
          enum: [portal, email, phone, chat, walk_in]
        supportLevel:
          type: integer
          enum: [1, 2, 3]
        departmentId: { type: integer }
        reporterId: { type: integer }
        assigneeId:
          type: ["integer", "null"]
        location:
          type: ["string", "null"]
        team:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        riskLevel:
          type: string
          enum: [low, medium, high, critical]
        rootCause:
          type: ["string", "null"]
        resolution:
          type: ["string", "null"]
      required: [title, description, type, priority, source, departmentId, reporterId]

    UpdateTicketInput:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        priority:
          type: string
          enum: [low, medium, high, urgent]
        status:
          type: string
          enum:
            - new
            - in_progress
            - with_user
            - with_vendor
            - on_hold
            - scheduled
            - resolved
            - closed
        supportLevel:
          type: integer
          enum: [1, 2, 3]
        assigneeId:
          type: ["integer", "null"]
        reporterId:
          type: integer
        location:
          type: ["string", "null"]
        team:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        riskLevel:
          type: string
          enum: [low, medium, high, critical]
