      summary: KPI cards + breakdown for a date range and (optionally) a department
      parameters:
        - in: query
          name: departmentId
          schema: { type: integer }
        - in: query
          name: assigneeId
          schema: { type: integer }
        - in: query
          name: rangeDays
          description: |
            Number of days back from "now" to include. Used as a
            fallback when an explicit `from`/`to` window is not
            provided, and as a granularity hint for the timeseries
            endpoint. Any positive integer is accepted.
          schema:
            type: integer
            minimum: 1
            default: 30
        - in: query
          name: from
          description: |
            Inclusive lower bound for ticket createdAt as an ISO 8601
            timestamp. When both `from` and `to` are provided, this
            window overrides `rangeDays` for filtering.
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          description: Inclusive upper bound for ticket createdAt as an ISO 8601 timestamp.
          schema:
            type: string
