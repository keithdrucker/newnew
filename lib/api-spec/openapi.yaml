        estimatedCostSavedDollars: { type: integer }
        statusBreakdown:
          type: array
          items: { $ref: "#/components/schemas/StatusBreakdownItem" }
        topAgents:
          type: array
          items: { $ref: "#/components/schemas/AgentLeaderboardItem" }
      required:
        - rangeDays
        - averageResponseSeconds
        - averageResolutionSeconds
        - slaResponseCompliance
        - slaResolutionCompliance
        - ticketsBreachedSla
        - responseBreachedCount
        - resolutionBreachedCount
        - openTickets
        - closedTickets
        - pendingTickets
        - resolvedTickets
        - newTickets
        - inProgressTickets
        - withUserTickets
        - withVendorTickets
        - onHoldTickets
