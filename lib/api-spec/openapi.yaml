            schema: { $ref: "#/components/schemas/CreateInitiativeInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Initiative" }

  /initiatives/{id}:
    get:
      operationId: getInitiative
      tags: [initiatives]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Initiative
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Initiative" }
        "404": { description: Not found }
    patch:
      operationId: updateInitiative
      tags: [initiatives]
      summary: |
        Update fields and/or transition status. Status changes are
        validated against an explicit allowed-transitions table:
        backlog ↔ under_review, under_review → approved | rejected_deferred,
        approved → under_review (reopen, preserves createdProjectId), and
        rejected_deferred → backlog | under_review (reopen). Disallowed
        transitions return 409. Approving atomically creates a Project
        and stamps createdProjectId on the returned record. Reopen and
        move-back transitions require a fresh `transitionReason`;
        approve / defer / reject require a fresh `decisionReason`;
        close-from-backlog requires `backlogNotes`.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateInitiativeInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Initiative" }
        "400":
          description: |
            Validation error — for example, missing decisionReason on
            approve/defer/reject, missing transitionReason on reopen or
            move-back, or missing backlogNotes on close-from-backlog.
        "409":
          description: |
            Disallowed status transition — the requested old → new
            status pair is not in the allowed-transitions table.
    delete:
      operationId: deleteInitiative
      tags: [initiatives]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }

