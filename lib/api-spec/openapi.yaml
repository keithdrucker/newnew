openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Sidekick API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: session
    description: Current user / role-based session
  - name: departments
    description: Department (board) operations
  - name: tickets
    description: Ticket operations across all department boards
  - name: people
    description: End users who file tickets
  - name: agents
    description: Agents who work tickets
  - name: knowledge-base
    description: Knowledge base articles per department
  - name: assets
    description: Hardware assets across sites and jobsites
  - name: dashboard
    description: Dashboard analytics endpoints
  - name: settings
    description: Department portal settings
  - name: initiatives
    description: Lightweight decision records — should we even do this work?
  - name: workflows
    description: Admin-managed workflow definitions and approval runs
  - name: board-views
    description: User-saved views for the team-scoped sections (Initiatives, Projects, Operational Tasks)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /session:
    get:
      operationId: getSession
      tags: [session]
      summary: Get the current user session
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
    post:
      operationId: switchSession
      tags: [session]
      summary: Switch the active user (demo role switcher)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SwitchSessionInput" }
      responses:
        "200":
          description: New session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }

  /me/preferences:
    patch:
      operationId: updateMePreferences
      tags: [session]
      summary: Update preferences for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMePreferencesInput" }
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }

  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List all departments (boards)
      parameters:
        - in: query
          name: scope
          required: false
          schema:
            type: string
            enum: [all, accessible]
            default: all
          description: >
            When set to `accessible`, returns only departments the current
            user can see data for (their visible boards). Admins always
            receive all departments regardless of this flag.
      responses:
        "200":
          description: Departments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Department" }
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create a department (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateDepartmentInput" }
      responses:
        "201":
          description: Created department
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Department" }

  /departments/{id}:
    get:
      operationId: getDepartment
      tags: [departments]
      summary: Get a department
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Department
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Department" }
    patch:
      operationId: updateDepartment
      tags: [departments]
      summary: Update a department (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateDepartmentInput" }
      responses:
        "200":
          description: Updated department
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Department" }
    delete:
      operationId: deleteDepartment
      tags: [departments]
      summary: Delete a department (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }

  /departments/{id}/settings:
    get:
      operationId: getDepartmentSettings
      tags: [settings]
      summary: Get granular portal settings for a department
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DepartmentSettings" }
    patch:
      operationId: updateDepartmentSettings
      tags: [settings]
      summary: Update granular portal settings for a department (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateDepartmentSettingsInput" }
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DepartmentSettings" }

  /departments/{id}/members:
    get:
      operationId: listBoardMembers
      tags: [settings]
      summary: List agents/admins assigned to this board with their per-board role
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BoardMember" }
    post:
      operationId: addBoardMember
      tags: [settings]
      summary: Add an agent to this board with a role (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddBoardMemberInput" }
      responses:
        "200":
          description: Updated existing membership
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BoardMember" }
        "201":
          description: Member added
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BoardMember" }

  /departments/{id}/members/{userId}:
    patch:
      operationId: updateBoardMember
      tags: [settings]
      summary: Change an agent's role on this board (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: userId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateBoardMemberInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BoardMember" }
    delete:
      operationId: removeBoardMember
      tags: [settings]
      summary: Remove an agent from this board (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: userId
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Removed

  /risk-rules:
    get:
      operationId: listRiskRules
      tags: [settings]
      summary: List category → default risk-level rules used to seed new tickets
      responses:
        "200":
          description: Risk rules
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RiskRule" }
    post:
      operationId: createRiskRule
      tags: [settings]
      summary: Create a category risk-level rule (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateRiskRuleInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RiskRule" }

  /risk-rules/{id}:
    patch:
      operationId: updateRiskRule
      tags: [settings]
      summary: Update a risk-level rule (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateRiskRuleInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RiskRule" }
    delete:
      operationId: deleteRiskRule
      tags: [settings]
      summary: Delete a risk-level rule (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Removed

  /tickets:
    get:
      operationId: listTickets
      tags: [tickets]
      summary: List tickets, scoped by current user's role and department
      parameters:
        - in: query
          name: departmentId
          schema: { type: integer }
        - in: query
          name: status
          description: |
            Filter by status. Repeatable — pass `?status=new&status=in_progress`
            to match any of the listed statuses.
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
              enum:
                - new
                - in_progress
                - with_user
                - with_vendor
                - on_hold
                - scheduled
                - resolved
                - closed
        - in: query
          name: priority
          schema:
            type: string
            enum: [low, medium, high, urgent]
        - in: query
          name: supportLevel
          schema: { type: integer, enum: [1, 2, 3] }
        - in: query
          name: assigneeId
          schema: { type: integer }
        - in: query
          name: unassigned
          schema: { type: boolean }
        - in: query
          name: riskLevel
          schema:
            type: string
            enum: [low, medium, high, critical]
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: slaStatus
          schema:
            type: string
            enum: [on_track, breached]
        - in: query
          name: hasRootCause
          schema: { type: boolean }
        - in: query
          name: hasResolution
          schema: { type: boolean }
        - in: query
          name: createdAfter
          schema: { type: string, format: date-time }
        - in: query
          name: createdBefore
          schema: { type: string, format: date-time }
        - in: query
          name: updatedAfter
          schema: { type: string, format: date-time }
        - in: query
          name: updatedBefore
          schema: { type: string, format: date-time }
        - in: query
          name: q
          schema: { type: string }
      responses:
        "200":
          description: Tickets
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Ticket" }
    post:
      operationId: createTicket
      tags: [tickets]
      summary: Create a ticket
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTicketInput" }
      responses:
        "201":
          description: Created ticket
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ticket" }

  /tickets/{id}:
    get:
      operationId: getTicket
      tags: [tickets]
      summary: Get a ticket with comments
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Ticket detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TicketDetail" }
    patch:
      operationId: updateTicket
      tags: [tickets]
      summary: Update a ticket (status, priority, assignment, etc.)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateTicketInput" }
      responses:
        "200":
          description: Updated ticket
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ticket" }
    delete:
      operationId: deleteTicket
      tags: [tickets]
      summary: Delete a ticket (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }

  /tickets/{id}/time-entries:
    get:
      operationId: listTicketTimeEntries
      tags: [tickets]
      summary: List internal time entries for a ticket (admin/agent only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Time entries
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TimeEntry" }
    post:
      operationId: createTicketTimeEntry
      tags: [tickets]
      summary: Log an internal time entry against a ticket
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTimeEntryInput" }
      responses:
        "201":
          description: Created entry
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TimeEntry" }

  /time-entries:
    get:
      operationId: listTimeEntries
      tags: [tickets]
      summary: List time entries within a date range
      description: >
        Returns the entries for `userId` if provided, otherwise the
        caller's own entries. The caller may only request another
        user's id when they are an admin or hold `manager+` on at
        least one board where the target user is also a member.
      parameters:
        - in: query
          name: from
          required: true
          schema: { type: string, format: date-time }
        - in: query
          name: to
          required: true
          schema: { type: string, format: date-time }
        - in: query
          name: userId
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Time entries (most recent first)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TimeEntry" }

  /time-entries/visible-users:
    get:
      operationId: listTimesheetVisibleUsers
      tags: [tickets]
      summary: List users whose timesheets the caller may view
      description: >
        Always includes the caller. For managers, also includes every
        teammate on the boards where they hold `manager+`. Admins
        receive every agent + admin.
      responses:
        "200":
          description: Users (sorted by name)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TimesheetVisibleUser" }

  /time-entries/{id}:
    patch:
      operationId: updateTimeEntry
      tags: [tickets]
      summary: Update a time entry's start/end/note (owner or admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateTimeEntryInput" }
      responses:
        "200":
          description: Updated entry
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TimeEntry" }
    delete:
      operationId: deleteTimeEntry
      tags: [tickets]
      summary: Delete a time entry (owner or admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }

  /tickets/{id}/comments:
    post:
      operationId: addTicketComment
      tags: [tickets]
      summary: Add a comment to a ticket
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddTicketCommentInput" }
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TicketComment" }

  /board-views:
    get:
      operationId: listBoardViews
      tags: [board-views]
      summary: List the current user's saved views for a section
      parameters:
        - in: query
          name: scope
          required: true
          schema: { $ref: "#/components/schemas/BoardViewScope" }
      responses:
        "200":
          description: Saved views
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BoardView" }
    post:
      operationId: createBoardView
      tags: [board-views]
      summary: Create a saved view for a section (Initiatives / Projects / Operational Tasks)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateBoardViewInput" }
      responses:
        "201":
          description: Created view
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BoardView" }

  /board-views/{id}:
    patch:
      operationId: updateBoardView
      tags: [board-views]
      summary: Rename, update filters, or set/unset default on a saved view
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateBoardViewInput" }
      responses:
        "200":
          description: Updated view
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BoardView" }
    delete:
      operationId: deleteBoardView
      tags: [board-views]
      summary: Delete a saved view
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }

  /ticket-views:
    get:
      operationId: listTicketViews
      tags: [tickets]
      summary: List the current user's saved ticket views
      responses:
        "200":
          description: Saved views
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TicketView" }
    post:
      operationId: createTicketView
      tags: [tickets]
      summary: Create a saved ticket view for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTicketViewInput" }
      responses:
        "201":
          description: Created view
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TicketView" }

  /ticket-views/{id}:
    patch:
      operationId: updateTicketView
      tags: [tickets]
      summary: Rename, update filters, or set/unset default on a saved view
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateTicketViewInput" }
      responses:
        "200":
          description: Updated view
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TicketView" }
    delete:
      operationId: deleteTicketView
      tags: [tickets]
      summary: Delete a saved view
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }

  /people:
    get:
      operationId: listPeople
      tags: [people]
      summary: List end users (people who file tickets)
      parameters:
        - in: query
          name: departmentId
          schema: { type: integer }
        - in: query
          name: q
          schema: { type: string }
      responses:
        "200":
          description: People
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Person" }
    post:
      operationId: createPerson
      tags: [people]
      summary: Add a person
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePersonInput" }
      responses:
        "201":
          description: Created person
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Person" }

  /people/{id}:
    get:
      operationId: getPerson
      tags: [people]
      summary: Get a person
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Person
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Person" }
    patch:
      operationId: updatePerson
      tags: [people]
      summary: Update a person
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePersonInput" }
      responses:
        "200":
          description: Updated person
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Person" }
    delete:
      operationId: deletePerson
      tags: [people]
      summary: Delete a person (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List agents (staff who work tickets)
      parameters:
        - in: query
          name: departmentId
          schema: { type: integer }
      responses:
        "200":
          description: Agents
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Agent" }
    post:
      operationId: createAgent
      tags: [agents]
      summary: Add an agent (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAgentInput" }
      responses:
        "201":
          description: Created agent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }

  /agents/{id}:
    patch:
      operationId: updateAgent
      tags: [agents]
      summary: Update an agent (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateAgentInput" }
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
    delete:
      operationId: deleteAgent
      tags: [agents]
      summary: Delete an agent (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }

  /knowledge-base:
    get:
      operationId: listKbArticles
      tags: [knowledge-base]
      summary: List knowledge base articles
      parameters:
        - in: query
          name: departmentId
          schema: { type: integer }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: source
          schema:
            type: string
            enum: [manual, confluence, notion, freshservice, sharepoint]
        - in: query
          name: status
          schema:
            type: string
            enum: [completed, failed, pending]
      responses:
        "200":
          description: Articles
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/KbArticle" }
    post:
      operationId: createKbArticle
      tags: [knowledge-base]
      summary: Create a knowledge base article
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateKbArticleInput" }
      responses:
        "201":
          description: Created article
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KbArticle" }

  /knowledge-base/{id}:
    get:
      operationId: getKbArticle
      tags: [knowledge-base]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Article
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KbArticle" }
    patch:
      operationId: updateKbArticle
      tags: [knowledge-base]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
