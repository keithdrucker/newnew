        initialPriority: { type: string }
        initialEffort: { type: string }
        businessAlignment: { type: string }
        investigationDecision: { type: string }
        backlogNotes: { type: string }
        # Backlog accountability dates
        reviewStartDate: { type: ["string", "null"], format: date }
        anticipatedApprovalDate: { type: ["string", "null"], format: date }
        # Under review (structured)
        benefits: { type: string }
        tradeoffs: { type: string }
        businessValueLevel: { type: string }
        businessValueSummary: { type: string }
        costLevel: { type: string }
        estimatedCost: { type: string }
        riskLevel: { type: string }
        validationStatus: { type: string }
        impactedTeams: { type: string }
