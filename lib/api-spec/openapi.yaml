        slaResponseCompliance: { type: number }
        slaResolutionCompliance: { type: number }
        # SLA Score reflects Resolution compliance (per spec). The legacy
        # `ticketsBreachedSla` keeps the total breach count; the new
        # `responseBreachedCount` / `resolutionBreachedCount` split lets
        # dashboards distinguish Response vs Resolution breaches.
        ticketsBreachedSla: { type: integer }
        responseBreachedCount: { type: integer }
        resolutionBreachedCount: { type: integer }
        # Legacy aliases — `openTickets` now counts `new`, and
        # `pendingTickets` now counts `in_progress`. They stay so the
        # existing Overview tiles keep working without UI churn.
        openTickets: { type: integer }
        closedTickets: { type: integer }
        pendingTickets: { type: integer }
        resolvedTickets: { type: integer }
        # New per-status counts for the 8-state workflow.
