        assignedTeam: { type: string }
        startDate: { type: ["string", "null"], format: date }
        endDate: { type: ["string", "null"], format: date }
        # --- Phase 2: Planning ---
        planningNotes: { type: string }
        # --- Phase 3: In Progress ---
        statusUpdate: { type: string }
        # --- Phase 4 (side): On Hold ---
        holdReason: { type: string }
        holdNotes: { type: string }
        revisitDate: { type: ["string", "null"], format: date }
        # --- Phase 5: Completed (closeout paperwork; editable) ---
        completionSummary: { type: string }
        # Required at "Mark as Closed"; what to repeat / change next time.
        keyTakeaway: { type: string }
        completedAt: { type: ["string", "null"], format: date-time }
        completedById: { type: ["integer", "null"] }
        completedByName: { type: ["string", "null"] }
        # --- Phase 6: Closed (locked; auto-captured at Mark as Closed) ---
        closedAt: { type: ["string", "null"], format: date-time }
        closedById: { type: ["integer", "null"] }
        closedByName: { type: ["string", "null"] }
        # --- Phase 7: Cancelled ---
        cancellationReason: { type: string }
        # Reverse link to the spawning Initiative (if any).
        linkedInitiativeId: { type: ["integer", "null"] }
        linkedInitiativeTitle: { type: ["string", "null"] }
        # --- Initiative metadata (project IS the initiative) ---
        suggestedById: { type: ["integer", "null"] }
        suggestedByName: { type: ["string", "null"] }
        # --- Initiative triage axes (carried over on approval) ---
        # Free-form strings; "" means not set (e.g. imported project).
        riskLevel: { type: string }
        category: { type: string }
        businessAlignment: { type: string }
        initialPriority: { type: string }
        initialEffort: { type: string }
        goal: { type: string }
        implementation: { type: string }
        rationale: { type: string }
        impactedDepartmentIds:
          type: array
          items: { type: integer }
        impactedDepartmentNames:
          type: array
          items: { type: string }
        additionalComments: { type: string }
        completedYear: { type: ["integer", "null"] }
        labels:
          type: array
          items: { $ref: "#/components/schemas/TaskLabel" }
        priority: { $ref: "#/components/schemas/TaskPriority" }
        # --- Work-step checklist (the steps to deliver this initiative) ---
        checklist:
          type: array
          items: { $ref: "#/components/schemas/ChecklistItem" }
        checklistTotal: { type: integer }
        checklistDone: { type: integer }
        commentCount: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        - id
        - name
        - description
        - color
        - phase
        - status
        - assignedTeam
        - planningNotes
        - statusUpdate
        - holdReason
        - holdNotes
        - completionSummary
        - keyTakeaway
        - cancellationReason
        - goal
        - implementation
        - rationale
        - impactedDepartmentIds
        - impactedDepartmentNames
        - additionalComments
        - labels
        - priority
        - riskLevel
        - category
        - businessAlignment
        - initialPriority
        - initialEffort
        - checklist
        - checklistTotal
        - checklistDone
        - commentCount
        - createdAt
        - updatedAt

