          type: ["string", "null"]
        resolution:
          type: ["string", "null"]
        closureReason:
          type: ["string", "null"]

    TicketViewConfig:
      type: object
      properties:
        search:
          type: ["string", "null"]
        status:
          type: ["array", "null"]
          description: |
            Multi-select status filter. Each entry must be one of the 8
            workflow statuses; `null` means "no status filter".
          items:
            type: string
            enum:
              - new
              - in_progress
              - with_user
              - with_vendor
              - on_hold
              - scheduled
              - resolved
              - closed
        priority:
          type: ["string", "null"]
          enum: [low, medium, high, urgent, null]
        supportLevel:
          type: ["integer", "null"]
          enum: [1, 2, 3, null]
        assigneeId:
          type: ["integer", "null"]
        unassigned:
          type: ["boolean", "null"]
        departmentId:
          type: ["integer", "null"]
        riskLevel:
          type: ["string", "null"]
          enum: [low, medium, high, critical, null]
        category:
          type: ["string", "null"]
        slaStatus:
          type: ["string", "null"]
          enum: [on_track, breached, null]
        hasRootCause:
          type: ["boolean", "null"]
        hasResolution:
          type: ["boolean", "null"]
        createdRange:
          type: ["string", "null"]
          enum: [today, week, month, all, null]
        updatedRange:
          type: ["string", "null"]
          enum: [today, week, month, all, null]
        sort:
          description: |
            Saved sort order for the ticket list. `field` is the column
            key being sorted on; `dir` is the direction. Both must be
            present together; omit the whole object to inherit the
            default (created desc).
          oneOf:
            - type: "null"
            - type: object
              properties:
                field:
                  type: string
                  enum:
                    - id
                    - created
                    - updated
                    - priority
                    - risk
                    - level
                    - assignee
                    - user
                    - status
                    - title
                    - category
                    - sla
                dir:
                  type: string
                  enum: [asc, desc]
              required: [field, dir]
        columns:
          description: |
            Saved column visibility. Each entry is a column key. Omit
            (or `null`) to inherit the default — every column visible.
            `id` and `title` are always rendered regardless of what's
            stored here.
          type: ["array", "null"]
          items:
            type: string
            enum:
              - id
              - priority
              - riskLevel
              - status
              - title
              - user
              - supportLevel
              - agent
              - category
              - created
              - updated
              - sla

