      type: object
      properties:
        id: { type: integer }
        action: { type: string }
        oldPhase: { type: ["string", "null"] }
        newPhase: { type: ["string", "null"] }
        reason: { type: string }
        detail: { type: object, additionalProperties: true }
        changedById: { type: ["integer", "null"] }
        changedByName: { type: ["string", "null"] }
        changedAt: { type: string, format: date-time }
      required: [id, action, reason, changedAt]

