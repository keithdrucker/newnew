      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }
        color: { type: string }
        # New canonical lifecycle (drives the Projects board UI).
        phase: { $ref: "#/components/schemas/ProjectPhase" }
        previousActivePhase: { type: ["string", "null"] }
        # Legacy status, retained for back-compat with downstream
        # consumers; new UI keys off `phase`.
        status: { $ref: "#/components/schemas/ProjectStatus" }
        departmentId: { type: ["integer", "null"] }
        departmentName: { type: ["string", "null"] }
        bucketId: { type: ["integer", "null"] }
        bucketName: { type: ["string", "null"] }
