    Workflow:
      type: object
      description: Admin-authored automation rule for a module.
      properties:
        id: { type: integer }
        name: { type: string }
        module:
          type: string
          enum: [tickets, initiatives, projects, changes, risks]
        workflowType:
          type: string
          enum:
            - approval
            - routing
            - escalation
            - notification
            - status_change
            - auto_assignment
        # Module-specific token (e.g. "ticket_created", "initiative_submitted",
        # "initiative_status_changed", …). The frontend renders the option
        # list per module; the API just stores the string.
        trigger: { type: string }
        conditions:
          type: array
          items: { $ref: "#/components/schemas/WorkflowCondition" }
        actions:
          type: array
          items: { $ref: "#/components/schemas/WorkflowAction" }
        approvalRequiredFromKind:
          type: string
          enum:
            - ""
            - specific_users
            - roles
            - department_heads
            - finance
            - security
            - it_leadership
            - executive_sponsor
        approvalRequiredFromTargets:
          type: array
          items:
            type: object
            additionalProperties: true
        approvalType:
          type: string
          enum: [single, all, any]
        requireDecisionRationale: { type: boolean }
        notifications: { $ref: "#/components/schemas/WorkflowNotifications" }
        status:
          type: string
          enum: [draft, active, inactive]
        createdById: { type: ["integer", "null"] }
        createdByName: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        - id
        - name
        - module
        - workflowType
        - trigger
        - conditions
        - actions
        - approvalRequiredFromKind
        - approvalRequiredFromTargets
        - approvalType
        - requireDecisionRationale
        - notifications
        - status
        - createdAt
        - updatedAt

