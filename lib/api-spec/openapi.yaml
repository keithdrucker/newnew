    # `completed` is the closeout-paperwork phase; `closed` is the
    # locked archived state reached via "Mark as Closed".
    ProjectPhase:
      type: string
      enum:
        - backlog_needs_assignment
        - planning
        - in_progress
        - on_hold
        - completed
        - closed
        - cancelled

